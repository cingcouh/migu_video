name: 自动同步咪咕视频源到iptv仓库
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你的iptv仓库
        uses: actions/checkout@v4
        with:
          repository: cingcouh/iptv
          token: ${{ secrets.PAT }}

      - name: 强制删除旧文件并下载最新版本
        run: |
          rm -f qg-iptv.m3u
          curl -L https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt -o qg-iptv.m3u

      - name: 提交更新到GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.nore.github.com"
          git add qg-iptv.m3u
          git commit -m "自动更新咪咕源" || exit 0
          git push
