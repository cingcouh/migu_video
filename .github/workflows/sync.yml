name: 自动同步咪咕视频源到iptv仓库
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你的iptv仓库
        uses: actions/checkout@v4
        with:
          repository: cingcouh/iptv
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 强制覆盖更新 qg-iptv.m3u
        run: |
          curl -sL https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt -o qg-iptv.m3u

      - name: 强制提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f qg-iptv.m3u
          git commit -m "强制更新 qg-iptv.m3u" || exit 0
          git push -f origin main
