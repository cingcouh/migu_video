name: 强制覆盖更新 qg-iptv.m3u
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取 iptv 仓库
        uses: actions/checkout@v4
        with:
          repository: cingcouh/iptv
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 下载最新内容并强制覆盖
        run: |
          rm -f qg-iptv.m3u
          curl -L https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt > qg-iptv.m3u

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force qg-iptv.m3u
          git commit -m "强制更新 qg-iptv.m3u"
          git push --force-with-lease origin main
