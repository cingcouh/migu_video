name: 自动同步咪咕视频源到iptv仓库
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout iptv repo
        uses: actions/checkout@v4
        with:
          repository: cingcouh/iptv
          token: ${{ secrets.PAT }}

      - name: Download latest interface.txt
        run: curl -L https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt -o qg-iptv.m3u

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qg-iptv.m3u
          git commit -m "Auto update" || exit 0
          git push
